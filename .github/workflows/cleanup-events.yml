name: Cleanup expired events

on:
  schedule:
    - cron: '0 0 * * *' # daily at midnight UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cleanup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: set if your deadline column has a different name
          SUPABASE_EVENTS_DEADLINE_COLUMN: ${{ secrets.SUPABASE_EVENTS_DEADLINE_COLUMN }}
        run: |
          node scripts/cleanup-events.mjs
